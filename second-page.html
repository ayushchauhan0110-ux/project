<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link rel="stylesheet" href="major-project.css" />
  <link rel="stylesheet" href="untitled-3.css">
</head>
<body>

  <!-- ===================== TOP BAR (fixed) ===================== -->
  <header class="navbar">
    <div class="logo">
      3D CAREER
      <div class="list">
        <div class="list-next">
          <a href="index.html"> Home</a>
          <a href="3d-model.html" id="edit"> 3d model</a>
          <a href="Tutorials.html"> Tutorials</a>
          <a href="Roadmap.html"> Roadmap</a>
        </div>
      </div>
    </div>
    <nav class="menu">
      <a href="/Login.html" id="navLogin">Login</a>
      <a href="#" id="navRegister">Register</a>
    </nav>
  </header>

  <!-- ===================== GLOWING DIVIDER (fixed) ===================== -->
  <div class="glow-line"></div>

  <!-- ===================== HERO: VIDEO BACKGROUND + LOGIN/REGISTER ===================== -->
  <!-- Note: video + form are visually "attached" in this hero section -->
  <section class="hero-section">
    <video class="hero-video" autoplay muted loop playsinline preload="auto">
      <source src="background.mp4" type="video/mp4" />
    </video>

    <div class="login-container" id="authBox">
      <!-- Title changes via JS to "Login" or "Register" -->
      <h2 id="formTitle">Login</h2>

      <!-- Login Form -->
      <form id="loginForm" class="form active">
        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn"><a class="login-next" href="/major-project.html">Login</a></button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="form">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter your name" required />
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" placeholder="Enter your email" required />
        </div>
        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Create a password" required />
        </div>
        <button type="submit" class="btn"><a class="login-next" href="/major-project.html">Register</a></button>
      </form>
    </div>
  </section>

  <!-- ===================== SPACER: BLACK GAP AFTER VIDEO ===================== -->
  <div class="gap-section"></div>

  <!-- ===================== OUR PROJECTS (LEFT-ALIGNED, HORIZONTAL SCROLL) ===================== -->
 


   


  <!-- ===================== CONTACT US (WHITE BACKGROUND ONLY HERE) ===================== -->
  <section class="contact-section">
    <h2>Contact Us</h2>
    <div class="contact-info">
      <p><strong>Email:</strong> support@mywebsite.com</p>
      <p><strong>Phone:</strong> +91 98765 43210</p>
      <p><strong>Address:</strong> 123 Creative Street, Meerut, India</p>
    </div>

    <form class="contact-form">
      <input type="text" placeholder="Your Name" required />
      <input type="email" placeholder="Your Email" required />
      <textarea placeholder="Your Message" rows="4" required></textarea>
      <button type="submit" class="btn contact-btn">Send</button>
    </form>
  </section>

  <script src="major-project.js"></script>
</body>
</html>
